<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition | User Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@200;300;400;700&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 100px auto;
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid var(--accent-cyan);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            padding-bottom: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: var(--accent-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #000;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-val {
            font-size: 2rem;
            color: var(--accent-cyan);
            font-family: 'Outfit', sans-serif;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="background-image"></div>
    <div class="overlay"></div>

    <header style="position: absolute; top: 20px; left: 5%; z-index: 100; width: 90%; display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="btn btn-secondary" style="padding: 8px 15px; font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 8px;">
            <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></span>
            BACK // HOME
        </a>
    </header>

    <main class="content-wrapper" style="justify-content: center; align-items: center; min-height: 100vh;">
        <div class="profile-container">
            <div class="profile-header">
                <div class="avatar" id="avatar-letter">U</div>
                <div>
                    <h2 style="font-family: 'Outfit', sans-serif; margin: 0; font-size: 2rem; color: var(--accent-cyan);" id="profile-username">USER</h2>
                    <span class="tag" style="margin-top: 5px; display: inline-block;">CLEARANCE: LEVEL 3</span>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-card" style="grid-column: span 2;">
                    <div class="stat-val">0</div>
                    <div class="stat-label">TOTAL SCANS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" style="color: var(--accent-red);">0</div>
                    <div class="stat-label">FAKE DETECTED</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" style="color: #fbbf24;">0</div>
                    <div class="stat-label">AI GENERATED</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" style="color: #10b981;">0</div>
                    <div class="stat-label">REAL IDENTIFIED</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" style="color: var(--accent-cyan);">0%</div>
                    <div class="stat-label">SCAN ACCURACY</div>
                </div>
            </div>

            <button onclick="logout()" class="btn btn-secondary" style="width: 100%; border-color: var(--accent-red); color: var(--accent-red); margin-top: 10px;">TERMINATE SESSION (LOGOUT)</button>
        </div>
    </main>

    <script>
        const user = localStorage.getItem('user');
        if (!user) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('profile-username').innerText = user.toUpperCase();
            document.getElementById('avatar-letter').innerText = user.charAt(0).toUpperCase();
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
