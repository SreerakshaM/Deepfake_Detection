<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | HUD Interface</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@200;300;400;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-left: 3px solid var(--accent-cyan);
            backdrop-filter: blur(10px);
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--accent-cyan);
            font-family: monospace;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--text-main);
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .auth-links {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="background-image"></div>
    <div class="overlay"></div>

    <main class="content-wrapper">
        <div class="auth-container">
            <h2 class="auth-title">IDENTIFY // RECOVERY</h2>
            <form id="forgot-password-form">
                <div class="form-group">
                    <label>GMAIL_ID</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter registered Gmail">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">VERIFY ACCESS</button>
            </form>
            <div class="auth-links">
                Back to <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = e.target.querySelector('button');
            const originalBtnText = submitBtn.innerText;

            try {
                // Show loading state
                submitBtn.innerText = 'TRANSMITTING...';
                submitBtn.disabled = true;

                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`SUCCESS // ${data.message}`);
                    submitBtn.innerText = 'CHECK INBOX';
                } else {
                    alert(`ACCESS DENIED // ${data.message}`);
                    submitBtn.innerText = originalBtnText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('CRITICAL ERROR // System communication failure.');
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
