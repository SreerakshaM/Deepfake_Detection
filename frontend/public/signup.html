<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | HUD Interface</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@200;300;400;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-left: 3px solid var(--accent-cyan);
            backdrop-filter: blur(10px);
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--accent-cyan);
            font-family: monospace;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--text-main);
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--accent-cyan);
            cursor: pointer;
            font-size: 0.7rem;
            font-family: monospace;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .auth-links {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="background-image"></div>
    <div class="overlay"></div>

    <main class="content-wrapper">
        <div class="auth-container">
            <h2 class="auth-title">REQUEST // CLEARANCE</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label>USER_ID</label>
                    <input type="text" id="username" class="form-control" required placeholder="Choose username">
                </div>
                <div class="form-group">
                    <label>EMAIL_ADDRESS</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>CONTACT_ID</label>
                    <input type="tel" id="phone" class="form-control" required placeholder="Enter phone number">
                </div>
                <div class="form-group">
                    <label>SECURE_KEY</label>
                    <div class="password-container">
                        <input type="password" id="password" class="form-control" required
                            placeholder="Choose password">
                        <button type="button" class="toggle-password"
                            onclick="togglePassword('password')">SCAN_SHOW</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>CONFIRM_KEY</label>
                    <div class="password-container">
                        <input type="password" id="confirm-password" class="form-control" required
                            placeholder="Re-enter password">
                        <button type="button" class="toggle-password"
                            onclick="togglePassword('confirm-password')">SCAN_SHOW</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">REQUEST ACCESS</button>
            </form>
            <div class="auth-links">
                Already have access? <a href="login.html">Login here</a>
            </div>
        </div>
    </main>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const button = event.target;
            if (input.type === 'password') {
                input.type = 'text';
                button.innerText = 'SCAN_HIDE';
            } else {
                input.type = 'password';
                button.innerText = 'SCAN_SHOW';
            }
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, phone, password })
            });

            const data = await response.json();
            if (response.ok) {
                alert("Clearance requested! You can now login.");
                window.location.href = 'login.html';
            } else {
                alert(data.message);
            }
        });
    </script>
</body>

</html>
