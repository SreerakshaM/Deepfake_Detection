<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | HUD Interface</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@200;300;400;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-left: 3px solid var(--accent-cyan);
            backdrop-filter: blur(10px);
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--accent-cyan);
            font-family: monospace;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--text-main);
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--accent-cyan);
            cursor: pointer;
            font-size: 0.7rem;
            font-family: monospace;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .auth-links {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #ff4444;
            font-family: monospace;
            font-size: 0.85rem;
            margin-bottom: 20px;
            padding: 12px;
            border: 1px solid rgba(255, 68, 68, 0.3);
            background: rgba(255, 68, 68, 0.1);
            border-radius: 4px;
            display: none;
        }

        .status-message {
            color: var(--accent-cyan);
            font-family: monospace;
            font-size: 0.85rem;
            margin-bottom: 20px;
            padding: 12px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(0, 242, 255, 0.1);
            border-radius: 4px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="background-image"></div>
    <div class="overlay"></div>

    <main class="content-wrapper">
        <div class="auth-container">
            <h2 class="auth-title">NEW // CREDENTIALS</h2>

            <div id="error-msg" class="error-message"></div>
            <div id="status-msg" class="status-message">VERIFYING TOKEN...</div>

            <form id="reset-password-form" style="display: none;">
                <div class="form-group">
                    <label>USER_ID</label>
                    <input type="text" id="username" class="form-control" readonly
                        style="opacity: 0.7; cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label>NEW_SECURE_KEY</label>
                    <div class="password-container">
                        <input type="password" id="password" class="form-control" required
                            placeholder="Choose new password">
                        <button type="button" class="toggle-password"
                            onclick="togglePassword('password')">SCAN_SHOW</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>CONFIRM_NEW_KEY</label>
                    <div class="password-container">
                        <input type="password" id="confirm-password" class="form-control" required
                            placeholder="Re-enter new password">
                        <button type="button" class="toggle-password"
                            onclick="togglePassword('confirm-password')">SCAN_SHOW</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">OVERWRITE KEY</button>
            </form>

            <div class="auth-links" id="back-link" style="display: none;">
                Back to <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script>
        // Get the token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const form = document.getElementById('reset-password-form');
        const errorMsg = document.getElementById('error-msg');
        const statusMsg = document.getElementById('status-msg');
        const backLink = document.getElementById('back-link');

        // Verify the token on page load
        async function verifyToken() {
            if (!token) {
                showError('ACCESS DENIED // No reset token provided. Please use the link from your email.');
                return;
            }

            statusMsg.style.display = 'block';

            try {
                const response = await fetch('/api/verify-reset-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (response.ok) {
                    // Token is valid — show the form
                    statusMsg.style.display = 'none';
                    form.style.display = 'block';
                    document.getElementById('username').value = data.username;
                } else {
                    showError(data.message || 'Invalid or expired reset link.');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('CRITICAL ERROR // Could not verify token. Is the server running?');
            }
        }

        function showError(msg) {
            statusMsg.style.display = 'none';
            form.style.display = 'none';
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            backLink.style.display = 'block';
        }

        function togglePassword(id) {
            const input = document.getElementById(id);
            const button = event.target;
            if (input.type === 'password') {
                input.type = 'text';
                button.innerText = 'SCAN_HIDE';
            } else {
                input.type = 'password';
                button.innerText = 'SCAN_SHOW';
            }
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert("MISMATCH // Passwords do not match.");
                return;
            }

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();
                if (response.ok) {
                    alert("SUCCESS // Password reset successfully! Redirecting to login.");
                    window.location.href = 'login.html';
                } else {
                    alert(`ERROR // ${data.message}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('CRITICAL ERROR // System communication failure.');
            }
        });

        // Verify token when page loads
        verifyToken();
    </script>
</body>

</html>
